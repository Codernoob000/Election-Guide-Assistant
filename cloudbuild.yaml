steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', 
         '--build-arg', 'VITE_GEMINI_API_KEY=$_GEMINI', 
         '--build-arg', 'VITE_GOOGLE_TRANSLATE_API_KEY=$_TRANSLATE', 
         '--build-arg', 'VITE_GA_MEASUREMENT_ID=$_GA', 
         '-t', 'gcr.io/$PROJECT_ID/election-guide:latest', 
         '.']
images: ['gcr.io/$PROJECT_ID/election-guide:latest']
